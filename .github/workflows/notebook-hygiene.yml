name: Notebook Hygiene

on:
  pull_request:
  push:

jobs:
  check-notebooks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate notebooks are stripped
        run: python .githooks/notebook_hygiene.py --check-all
